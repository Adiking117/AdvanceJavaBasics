<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Book</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    form {
      max-width: 400px;
      margin: auto;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    input[type="number"] {
      width: 100%;
      padding: 8px;
    }
    button {
      margin-top: 15px;
      padding: 10px 15px;
    }
  </style>
</head>
<body>
  <h1>Delete a Book</h1>
  <form action="delete" method="post">
    <label for="id">Book ID:</label>
    <input type="number" id="id" name="id" required>
    <button type="submit">Delete Book</button>
  </form>
</body>
</html>
